# Kaggle notebook config. Replace COVER_SONGS with your Kaggle Input dataset slug.
experiment_name: baseline_mert_ntxent

backbone: mert
backbone_checkpoint: m-audio/MERT-v1-95M
sample_rate: 24000

projection:
  hidden_dim: 512
  output_dim: 128
  dropout: 0.1

augment: none
augment_mode: offline
sampling: random
loss: ntxent
pool: mean
segments_per_track: 5
segment_seconds: 5.0
seed: 42

training:
  batch_size: 32
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  val_every: 1
  val_fraction: 0.2
  num_workers: 0
  pin_memory: false

paths:
  manifest: /kaggle/input/COVER_SONGS/cover-dataset/data/audio_manifest.csv
  segments_dir: /kaggle/working/data_processed
  audio_root: /kaggle/input/COVER_SONGS/cover-dataset/data
  cache_dir: /kaggle/working/cached_features
  checkpoints: /kaggle/working/checkpoints
  results_dir: /kaggle/working/results
