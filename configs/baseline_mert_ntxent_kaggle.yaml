# Kaggle notebook config for theodorapavlidou/cover-song-dataset.
#
# Dataset mount (2024+ layout):
#   /kaggle/input/datasets/<username>/<dataset-slug>/cover-dataset/
#
# Manifest audio_path values are like `data/audio/<id>.wav`, so audio_root must be
# the `cover-dataset` folder (not `cover-dataset/data`) to avoid .../data/data/audio/...
experiment_name: baseline_mert_ntxent

backbone: mert
backbone_checkpoint: m-a-p/MERT-v1-95M
sample_rate: 24000

projection:
  hidden_dim: 512
  output_dim: 128
  dropout: 0.3

augment: none
sampling: random
loss: ntxent
pool: mean
segments_per_track: 5
segment_seconds: 5.0
seed: 42
eval_level: track_dtw

training:
  batch_size: 32
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  val_every: 1
  val_fraction: 0.2
  early_stopping_patience: 12
  num_workers: 0
  pin_memory: false

paths:
  manifest: /kaggle/input/datasets/theodorapavlidou/cover-song-dataset/cover-dataset/data/audio_manifest.csv
  segments_dir: /kaggle/working/data_processed
  audio_root: /kaggle/input/datasets/theodorapavlidou/cover-song-dataset/cover-dataset
  cache_dir: /kaggle/working/cached_features
  checkpoints: /kaggle/working/checkpoints
  results_dir: /kaggle/working/results
