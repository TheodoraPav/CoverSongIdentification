experiment_name: baseline_mert_ntxent

backbone: mert
backbone_checkpoint: m-a-p/MERT-v1-95M
sample_rate: 24000

projection:
  hidden_dim: 512
  output_dim: 128
  dropout: 0.3

augment: none
sampling: random
loss: ntxent
pool: mean
segment_pool_mode: dynamic
segments_per_track: 10
segment_pool_max: 40
segment_seconds: 5.0
seed: 42
eval_level: track_dtw

# Stage-2 CSM + CNN matcher (off by default; run train_csm_matcher.py after train.py)
matcher:
  enabled: false
  csm_size: 10
  csm_resize: false
  epochs: 30
  batch_size: 32
  lr: 0.001
  negatives_per_positive: 4
  hard_negatives: true
  symmetric_pairs: true
  early_stopping_patience: 5

training:
  batch_size: 64
  epochs: 50
  lr: 0.0001
  weight_decay: 0.0001
  val_every: 1
  val_fraction: 0.2
  early_stopping_patience: 12
  triplet_margin: 0.3
  ntxent_temperature: 0.1
  use_group_batch_sampler: true
  num_workers: 2
  pin_memory: true

paths:
  # Local (default). On Colab/Kaggle, override paths. Manifest uses `data/audio/*.wav`.
  manifest: cover-dataset/data/audio_manifest.csv
  segments_dir: data_processed
  audio_root: cover-dataset
  cache_dir: cached_features
  checkpoints: checkpoints
  results_dir: results
