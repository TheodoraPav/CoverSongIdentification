# Copy of baseline with Google Drive paths. Adjust MyDrive folder to match your setup.
experiment_name: baseline_mert_ntxent

backbone: mert
backbone_checkpoint: m-a-p/MERT-v1-95M
sample_rate: 24000

projection:
  hidden_dim: 512
  output_dim: 128
  dropout: 0.1

augment: none
sampling: random
loss: ntxent
pool: mean
segments_per_track: 5
segment_seconds: 5.0
seed: 42
eval_level: track_dtw

training:
  batch_size: 64
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  val_every: 1
  val_fraction: 0.2
  num_workers: 0
  pin_memory: true

paths:
  manifest: /content/drive/MyDrive/CoverSongs/cover-dataset/data/audio_manifest.csv
  segments_dir: /content/drive/MyDrive/CoverSongs/data_processed
  audio_root: /content/drive/MyDrive/CoverSongs/cover-dataset
  cache_dir: /content/drive/MyDrive/CoverSongs/cached_features
  checkpoints: /content/drive/MyDrive/CoverSongs/checkpoints
  results_dir: /content/drive/MyDrive/CoverSongs/results
